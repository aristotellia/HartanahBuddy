  <script type="text/babel">
    const { useState, useEffect, useMemo, createContext, useContext } = React;

    // =========================================================================
    // ARCHITECTURE & CONFIGURATION REGISTRY
    // =========================================================================
    const MODULE_REGISTRY = [
      { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
      { id: 'kirabuddy', label: 'KiraBuddy', icon: 'calculator' },
      { id: 'contentbuddy', label: 'ContentBuddy', icon: 'sparkles' },
      { id: 'closingbuddy', label: 'ClosingBuddy', icon: 'message-square' },
      { id: 'settings', label: 'Settings', icon: 'settings' }
    ];

    // System Toast State Context
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    // Active User Context
    const UserContext = createContext(null);
    const useUser = () => useContext(UserContext);

    // =========================================================================
    // UTILITY FUNCTIONS & CALCULATORS
    // =========================================================================
    const formatMYR = (val) => new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR', maximumFractionDigits: 0 }).format(val || 0);

    const calculateNewLaunch = (inputs) => {
      const price = parseFloat(inputs.propertyPrice) || 0;
      const devDiscount = (price * (parseFloat(inputs.developerDiscount) || 0)) / 100;
      const bumiDiscount = ((price - devDiscount) * (parseFloat(inputs.bumiDiscount) || 0)) / 100;
      const spaPrice = price - devDiscount - bumiDiscount;
      
      const rebate = parseFloat(inputs.rebate) || 0;
      const cashback = parseFloat(inputs.cashback) || 0;
      const nettPrice = spaPrice - rebate;

      const margin = (parseFloat(inputs.loanMargin) || 90) / 100;
      const loanAmount = spaPrice * margin;
      const downpayment = spaPrice - loanAmount;
      
      const bookingFee = parseFloat(inputs.bookingFee) || 0;
      const cashNeeded = Math.max(0, downpayment - rebate - bookingFee) + (cashback < 0 ? Math.abs(cashback) : 0);

      const rate = (parseFloat(inputs.interestRate) || 4.2) / 100 / 12;
      const tenureMonths = (parseInt(inputs.loanTenure) || 35) * 12;
      
      let monthlyInstalment = 0;
      if (rate > 0 && tenureMonths > 0) {
        monthlyInstalment = (loanAmount * rate * Math.pow(1 + rate, tenureMonths)) / (Math.pow(1 + rate, tenureMonths) - 1);
      }

      const progressiveInterest = loanAmount * (0.045 / 12) * 0.5; // Average stage estimation

      return { spaPrice, nettPrice, loanAmount, downpayment, cashNeeded, monthlyInstalment, progressiveInterest };
    };

    const calculateAffordability = (inputs) => {
      const income = parseFloat(inputs.monthlyIncome) || 0;
      const commitments = parseFloat(inputs.existingCommitments) || 0;
      const rate = (parseFloat(inputs.interestRate) || 4.2) / 100 / 12;
      const tenureMonths = (parseInt(inputs.loanTenure) || 35) * 12;
      const margin = (parseFloat(inputs.loanMargin) || 90) / 100;

      // Tiered DSR logic standard in Malaysian Banking
      let maxDsrPct = 0.60;
      if (income >= 5000) maxDsrPct = 0.70;
      if (income >= 10000) maxDsrPct = 0.85;

      const maxAllowedCommitment = income * maxDsrPct;
      const maxMonthlyInstalment = Math.max(0, maxAllowedCommitment - commitments);
      
      let maxLoanEligibility = 0;
      if (rate > 0 && tenureMonths > 0 && maxMonthlyInstalment > 0) {
        maxLoanEligibility = (maxMonthlyInstalment * (Math.pow(1 + rate, tenureMonths) - 1)) / (rate * Math.pow(1 + rate, tenureMonths));
      }

      const maxAffordablePropertyPrice = maxLoanEligibility / margin;
      const dsr = income > 0 ? ((commitments / income) * 100).toFixed(1) : 0;

      return { dsr, maxMonthlyInstalment, maxLoanEligibility, maxAffordablePropertyPrice };
    };

    // Simulated OpenAI Direct Client Service (JSON Mode Compliant)
    const callOpenAIService = async (apiKey, prompt, systemInstruction) => {
      if (!apiKey) {
        // High quality local fallback structured response if API key is omitted
        await new Promise(r => setTimeout(r, 1200));
        return null; // Signals parent to use robust client fallback template engine
      }

      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'gpt-3.5-turbo',
            messages: [
              { role: 'system', content: systemInstruction + " Respond strictly in valid JSON format." },
              { role: 'user', content: prompt }
            ],
            response_format: { type: "json_object" },
            temperature: 0.7
          })
        });
        const data = await res.json();
        return JSON.parse(data.choices[0].message.content);
      } catch (err) {
        console.warn("OpenAI API call failed or misconfigured. Falling back to local AI engine.", err);
        return null;
      }
    };

    // =========================================================================
    // UI REUSABLE COMPONENTS

    const Icon = ({ name, className = "w-5 h-5" }) => {

    const Card = ({ children, className = "" }) => (

    const Input = ({ label, prefix, suffix, className = "", ...props }) => (

            <div className="relative my-6 text-center text-xs text-slate-400">

    const KiraBuddyView = ({ onSaveRecord, savedRecords, onDeleteRecord }) => {

          </div>

          {tab === 'newlaunch' ? (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              <Card className="lg:col-span-5 space-y-4">
                <h3 className="font-semibold text-slate-900 text-sm">Inputs & Package</h3>
                <Input label="Property Gross Price" prefix="RM" type="number" value={nlInputs.propertyPrice} onChange={e => setNlInputs({...nlInputs, propertyPrice: e.target.value})} />
                <div className="grid grid-cols-2 gap-3">
                  <Input label="Dev Discount" suffix="%" type="number" value={nlInputs.developerDiscount} onChange={e => setNlInputs({...nlInputs, developerDiscount: e.target.value})} />

    // =========================================================================

    // =========================================================================
    const App = () => {
      const [user, setUser] = useState(null);
      const [authChecking, setAuthChecking] = useState(true);
      const [activeModule, setActiveModule] = useState('dashboard');
      const [toast, setToast] = useState(null);
      const [savedItems, setSavedItems] = useState([]);
      const [apiKey, setApiKey] = useState(localStorage.getItem('hb_openai_key') || '');
      const [searchQuery, setSearchQuery] = useState('');

      // Firebase Auth Listener
      useEffect(() => {
        const unsubscribe = window.hbAuthProviders.onAuthStateChanged(window.hbAuth, (u) => {
          setUser(u);
          setAuthChecking(false);
          if (u) loadUserFirestoreData(u.uid);
        });
        return () => unsubscribe();
      }, []);

      // Firestore Data Hydration
      const loadUserFirestoreData = async (uid) => {
        try {
          const { collection, query, where, getDocs } = window.hbFirestore;
          const q = query(collection(window.hbDb, "user_records"), where("userId", "==", uid));
          const querySnapshot = await getDocs(q);
          const docs = [];
          querySnapshot.forEach((doc) => docs.push({ id: doc.id, ...doc.data() }));
          setSavedItems(docs);
        } catch (e) {
          console.warn("Firestore fetch offline fallback.", e);
        }
      };

      const handleSaveRecord = async (record) => {
        const item = { ...record, userId: user?.uid || 'guest', id: Date.now().toString() };
        setSavedItems(prev => [item, ...prev]);

        if (user) {
          try {
            const { collection, addDoc } = window.hbFirestore;
            await addDoc(collection(window.hbDb, "user_records"), item);
          } catch (e) {
            console.error("Error writing to Firestore:", e);
          }
        }
      };

      const showToast = (message, type = 'success') => setToast({ message, type });

      if (authChecking) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50">
            <Icon name="loader-2" className="w-8 h-8 text-slate-800 animate-spin" />
          </div>
        );
      }

      if (!user) {
        return (
          <ToastContext.Provider value={showToast}>
            <AuthView onLoginSuccess={() => {}} />
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          </ToastContext.Provider>
        );
      }

      return (
        <UserContext.Provider value={user}>
          <ToastContext.Provider value={showToast}>
            <div className="min-h-screen flex bg-slate-50 text-slate-800">
              
              {/* Left Global Navigation Sidebar */}
              <aside className="w-64 bg-white border-r border-slate-200/80 flex flex-col justify-between hidden md:flex sticky top-0 h-screen z-20">
                <div className="p-6">
                  <div className="flex items-center gap-3 mb-8">
                    <div className="w-9 h-9 rounded-xl bg-slate-900 text-white flex items-center justify-center font-bold text-base shadow-sm">
                      HB
                    </div>
                    <div>
                      <div className="font-bold text-slate-900 text-base leading-tight">HartanahBuddy</div>
                      <div className="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Pro Version 1.0</div>
                    </div>
                  </div>

                  <nav className="space-y-1">
                    {MODULE_REGISTRY.map(m => (
                      <button
                        key={m.id}
                        onClick={() => setActiveModule(m.id)}
                        className={`w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all ${
                          activeModule === m.id ? 'bg-slate-900 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'
                        }`}>
                        <Icon name={m.icon} className="w-4 h-4" />
                        {m.label}
                      </button>
                    ))}
                  </nav>
                </div>

                <div className="p-4 border-t border-slate-100 space-y-2">
                  <div className="px-3 py-2 flex items-center justify-between text-xs text-slate-500">
                    <span className="font-medium truncate max-w-[120px]">{user.email}</span>
                    <span className="px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded-md font-semibold text-[10px]">Active</span>
                  </div>
                  <button 
                    onClick={() => window.hbAuthProviders.signOut(window.hbAuth)} 
                    className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-medium text-red-600 hover:bg-red-50 transition-colors">
                    <Icon name="log-out" className="w-4 h-4" /> Sign Out
                  </button>
                </div>
              </aside>

              {/* Main App Container */}
              <div className="flex-1 flex flex-col min-w-0">
                
                {/* Top Navbar */}
                <header className="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200/80 sticky top-0 z-10 px-6 flex items-center justify-between gap-4">
                  <div className="flex items-center gap-3 md:hidden">
                    <div className="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center font-bold text-sm">HB</div>
                  </div>

                  {/* Search Bar */}
                  <div className="relative max-w-md w-full">
                    <Icon name="search" className="w-4 h-4 absolute left-3.5 top-3 text-slate-400" />
                    <input 
                      type="text" 
                      placeholder="Search previous calculations, content & replies..." 
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      className="w-full bg-slate-100/80 rounded-xl pl-9 pr-4 py-2 text-xs text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 transition-all"
                    />
                  </div>

                  {/* Header Badges */}
                  <div className="flex items-center gap-3">
                    <span className="hidden sm:inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-200/60">
                      V1.0 PRO
                    </span>
                    <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-bold text-xs text-slate-700">
                      {user.email ? user.email[0].toUpperCase() : 'A'}
                    </div>
                  </div>
                </header>

                {/* Main Content Area */}
                <main className="p-6 md:p-10 max-w-7xl w-full mx-auto flex-1">
                  {activeModule === 'dashboard' && <DashboardView setActiveModule={setActiveModule} savedItems={savedItems} />}
                  {activeModule === 'kirabuddy' && <KiraBuddyView onSaveRecord={handleSaveRecord} savedRecords={savedItems} />}
                  {activeModule === 'contentbuddy' && <ContentBuddyView onSaveRecord={handleSaveRecord} apiKey={apiKey} />}
                  {activeModule === 'closingbuddy' && <ClosingBuddyView onSaveRecord={handleSaveRecord} apiKey={apiKey} />}
                  {activeModule === 'settings' && <SettingsView apiKey={apiKey} setApiKey={setApiKey} />}
                </main>
              </div>

              {/* Toast Render */}
              {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
            </div>
          </ToastContext.Provider>
        </UserContext.Provider>
      );
    };

    // Mount Single Page React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
